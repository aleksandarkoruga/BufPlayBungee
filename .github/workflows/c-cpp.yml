name: Build BufPlayBungee

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout plugin with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout SuperCollider source
      uses: actions/checkout@v4
      with:
        repository: supercollider/supercollider
        path: supercollider

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DSC_PATH="${{ github.workspace }}/supercollider"

    - name: Build
      run: |
        cmake --build build --config Release

    - name: List build output (debug)
      run: |
        echo "=== Build directory contents ==="
        ls -R build
      shell: bash

    - name: Upload plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: BufPlayBungee-${{ matrix.os }}
        path: |
          build/Release/BufPlayBungee*.scx
          build/BufPlayBungee*.scx
          build/*/BufPlayBungee*.scx
        if-no-files-found: error
