name: Build and Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'  # Trigger on version tags
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout plugin with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout SuperCollider source
      uses: actions/checkout@v4
      with:
        repository: supercollider/supercollider
        path: supercollider

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DSC_PATH="${{ github.workspace }}/supercollider"

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Upload artifacts (for all runs)
      uses: actions/upload-artifact@v4
      with:
        name: BufPlayBungee-${{ matrix.os }}
        path: |
          build/**/BufPlayBungee*.scx
        if-no-files-found: warn

    - name: Prepare release assets
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p release-assets
        cp $(find build -name "BufPlayBungee*.scx" -type f -o -name "BufPlayBungee*.scx" -type d) release-assets/ 2>/dev/null || true
        if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          cd release-assets
          for d in BufPlayBungee*.scx; do
            if [ -d "$d" ]; then
              zip -r "../${d}.zip" "$d"
              rm -rf "$d"
            fi
          done
          cd ..
        fi
      shell: bash

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
