name: Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [published]  # This triggers when you publish a release

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout plugin with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout SuperCollider source
      uses: actions/checkout@v4
      with:
        repository: supercollider/supercollider
        path: supercollider

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DSC_PATH="${{ github.workspace }}/supercollider"

    - name: Build
      run: |
        cmake --build build --config Release

    - name: List build output (debug)
      run: |
        echo "=== Build directory contents ==="
        ls -R build
      shell: bash

    - name: Upload artifacts (workflow storage)
      uses: actions/upload-artifact@v4
      with:
        name: BufPlayBungee-${{ matrix.os }}
        path: |
          build/**/BufPlayBungee*.scx
          plugins/BufPlayBungee/BufPlayBungee.sc
        if-no-files-found: warn

    - name: Prepare release assets
      if: github.event_name == 'release'  # Only run on release events
      run: |
        mkdir -p release-assets
        # Copy the SC class file
        cp plugins/BufPlayBungee/BufPlayBungee.sc release-assets/
        # Find and copy any .scx files or directories
        find build -name "BufPlayBungee*.scx" -exec cp -r {} release-assets/ \; 2>/dev/null || true
        # On macOS, .scx is a directory; zip the whole bundle
        if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          cd release-assets
          # Create a zip of the macOS bundle (if present)
          for item in BufPlayBungee*.scx; do
            if [ -d "$item" ]; then
              zip -r "${item}.zip" "$item"
              rm -rf "$item"
            fi
          done
          cd ..
        fi
      shell: bash

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'  # Only run on release events
      with:
        files: release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
