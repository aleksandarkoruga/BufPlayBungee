name: Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, macos-12]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout plugin with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout SuperCollider source
      uses: actions/checkout@v4
      with:
        repository: supercollider/supercollider
        path: supercollider

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DSC_PATH="${{ github.workspace }}/supercollider"
    - name: Build
      run: |
        cmake --build build --config Release
    - name: List build output (debug)
      run: |
        echo "=== Build directory contents ==="
        ls -R build
      shell: bash

    - name: Prepare artifact folder
      run: |
        mkdir -p artifact
        # Copy the SC class file
        cp plugins/BufPlayBungee/BufPlayBungee.sc artifact/
        # Find and copy .scx files/directories
        find build -name "BufPlayBungee*.scx" -exec cp -r {} artifact/ \; 2>/dev/null || true
        # On macOS, the .scx is a directory; we'll leave it as is (it will appear as a folder in the artifact zip)
        # If you prefer a zip, uncomment the next block:
        # if [[ "${{ matrix.os }}" == macos-* ]]; then
        #   cd artifact
        #   for item in BufPlayBungee*.scx; do
        #     if [ -d "$item" ]; then
        #       zip -r "${item}.zip" "$item"
        #       rm -rf "$item"
        #     fi
        #   done
        #   cd ..
        # fi
      shell: bash

    - name: Set artifact name
      id: set-artifact-name
      run: |
        if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          echo "ARTIFACT_NAME=BufPlayBungee-macOS-arm64" >> $GITHUB_OUTPUT
        elif [[ "${{ matrix.os }}" == "macos-12" ]]; then
          echo "ARTIFACT_NAME=BufPlayBungee-macOS-x64" >> $GITHUB_OUTPUT
        else
          echo "ARTIFACT_NAME=BufPlayBungee-${{ matrix.os }}" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Upload artifact (clean folder)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set-artifact-name.outputs.ARTIFACT_NAME }}
        path: artifact/*
        if-no-files-found: error

    - name: Prepare release assets
      if: github.event_name == 'release'
      run: |
        mkdir -p release-assets
        cp plugins/BufPlayBungee/BufPlayBungee.sc release-assets/
        find build -name "BufPlayBungee*.scx" -exec cp -r {} release-assets/ \; 2>/dev/null || true
        if [[ "${{ matrix.os }}" == macos-* ]]; then
          cd release-assets
          for item in BufPlayBungee*.scx; do
            if [ -d "$item" ]; then
              # Add architecture suffix to the zip filename
              if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
                mv "$item" "${item%.scx}-arm64.scx"
                zip -r "${item%.scx}-arm64.scx.zip" "${item%.scx}-arm64.scx"
              else
                mv "$item" "${item%.scx}-x64.scx"
                zip -r "${item%.scx}-x64.scx.zip" "${item%.scx}-x64.scx"
              fi
              rm -rf "${item%.scx}-arm64.scx" "${item%.scx}-x64.scx" 2>/dev/null || true
            fi
          done
          cd ..
        fi
      shell: bash

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'release'
      with:
        files: release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
